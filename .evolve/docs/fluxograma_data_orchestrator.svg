<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="960" height="620" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrowDown" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 5 10 L 10 0 Z" fill="#7f8c8d"/>
    </marker>
    <linearGradient id="gradTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#34495e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gradMid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2980b9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gradBot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2ecc71;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Título -->
  <text x="480" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Arquitetura do DataOrchestrator — 3 Camadas</text>
  <text x="480" y="47" text-anchor="middle" font-size="10" fill="#7f8c8d">Roteamento inteligente de queries em linguagem natural para fontes de dados</text>

  <!-- CAMADA 1: Usuário/Pesquisador -->
  <rect x="80" y="65" width="800" height="130" rx="12" fill="url(#gradTop)" opacity="0.92"/>
  <text x="480" y="92" text-anchor="middle" font-size="15" font-weight="bold" fill="white">CAMADA 1 — Interface do Pesquisador</text>
  <text x="480" y="115" text-anchor="middle" font-size="10" fill="#bdc3c7">Query em linguagem natural — Zero conhecimento técnico necessário</text>

  <!-- Exemplos de queries -->
  <rect x="110" y="125" width="230" height="30" rx="6" fill="white" opacity="0.95"/>
  <text x="225" y="145" text-anchor="middle" font-size="10" fill="#2c3e50">"PIB do Brasil em 2023"</text>

  <rect x="365" y="125" width="230" height="30" rx="6" fill="white" opacity="0.95"/>
  <text x="480" y="145" text-anchor="middle" font-size="10" fill="#2c3e50">"preço da ação da Apple"</text>

  <rect x="620" y="125" width="230" height="30" rx="6" fill="white" opacity="0.95"/>
  <text x="735" y="145" text-anchor="middle" font-size="10" fill="#2c3e50">"artigos sobre deep learning"</text>

  <rect x="300" y="160" width="360" height="22" rx="6" fill="#ecf0f1" opacity="0.7"/>
  <text x="480" y="176" text-anchor="middle" font-size="9" fill="#7f8c8d">"top criptomoedas" | "mapa do Brasil" | "dados covid" | "coordenadas SP"</text>

  <!-- Seta Camada 1 → 2 -->
  <line x1="480" y1="198" x2="480" y2="228" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- CAMADA 2: DataOrchestrator -->
  <rect x="80" y="232" width="800" height="198" rx="12" fill="url(#gradMid)" opacity="0.92"/>
  <text x="480" y="258" text-anchor="middle" font-size="15" font-weight="bold" fill="white">CAMADA 2 — DataOrchestrator (Roteamento Inteligente)</text>

  <!-- Subcomponentes -->
  <rect x="100" y="272" width="175" height="65" rx="8" fill="white" opacity="0.95"/>
  <text x="187" y="294" text-anchor="middle" font-size="11" font-weight="bold" fill="#2980b9">QueryIntent</text>
  <text x="187" y="310" text-anchor="middle" font-size="8" fill="#34495e">Parser de intenção</text>
  <text x="187" y="325" text-anchor="middle" font-size="8" fill="#7f8c8d">80+ keywords → 8 domínios</text>

  <rect x="295" y="272" width="175" height="65" rx="8" fill="white" opacity="0.95"/>
  <text x="382" y="294" text-anchor="middle" font-size="11" font-weight="bold" fill="#2980b9">DataSourceRegistry</text>
  <text x="382" y="310" text-anchor="middle" font-size="8" fill="#34495e">Auto-discovery</text>
  <text x="382" y="325" text-anchor="middle" font-size="8" fill="#7f8c8d">8 domínios, 30+ bibliotecas</text>

  <rect x="490" y="272" width="175" height="65" rx="8" fill="white" opacity="0.95"/>
  <text x="577" y="294" text-anchor="middle" font-size="11" font-weight="bold" fill="#2980b9">FallbackChain</text>
  <text x="577" y="310" text-anchor="middle" font-size="8" fill="#34495e">Fonte primária → secundária</text>
  <text x="577" y="325" text-anchor="middle" font-size="8" fill="#7f8c8d">Tolerância a falhas</text>

  <rect x="685" y="272" width="175" height="65" rx="8" fill="white" opacity="0.95"/>
  <text x="772" y="294" text-anchor="middle" font-size="11" font-weight="bold" fill="#2980b9">DataResult</text>
  <text x="772" y="310" text-anchor="middle" font-size="8" fill="#34495e">Formato unificado</text>
  <text x="772" y="325" text-anchor="middle" font-size="8" fill="#7f8c8d">source + data + confidence</text>

  <!-- Fluxo entre subcomponentes -->
  <line x1="275" y1="304" x2="292" y2="304" stroke="#bdc3c7" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <line x1="470" y1="304" x2="487" y2="304" stroke="#bdc3c7" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <line x1="665" y1="304" x2="682" y2="304" stroke="#bdc3c7" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Handlers -->
  <rect x="100" y="350" width="760" height="70" rx="6" fill="white" opacity="0.85"/>
  <text x="120" y="370" font-size="10" font-weight="bold" fill="#2c3e50">Handlers:</text>
  <text x="120" y="388" font-size="9" fill="#34495e">_handle_geo → _handle_finance → _handle_crypto → _handle_economic → _handle_academic → _handle_biomed → _handle_health → _handle_pdf → _handle_unknown</text>
  <text x="120" y="406" font-size="8" fill="#7f8c8d">Cada handler encapsula a lógica específica de domínio com fallback automático</text>

  <!-- Seta Camada 2 → 3 -->
  <line x1="480" y1="432" x2="480" y2="462" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- CAMADA 3: Ecosystem Hooks + Bibliotecas -->
  <rect x="80" y="466" width="800" height="138" rx="12" fill="url(#gradBot)" opacity="0.92"/>
  <text x="480" y="492" text-anchor="middle" font-size="15" font-weight="bold" fill="white">CAMADA 3 — Ecosystem Hooks (10) + Bibliotecas Python (30+)</text>

  <!-- Hooks -->
  <rect x="100" y="505" width="120" height="30" rx="5" fill="white" opacity="0.9"/>
  <text x="160" y="525" text-anchor="middle" font-size="9" fill="#27ae60">GeoAnalyzer</text>
  <rect x="228" y="505" width="120" height="30" rx="5" fill="white" opacity="0.9"/>
  <text x="288" y="525" text-anchor="middle" font-size="9" fill="#27ae60">FinanceAnalyzer</text>
  <rect x="356" y="505" width="120" height="30" rx="5" fill="white" opacity="0.9"/>
  <text x="416" y="525" text-anchor="middle" font-size="9" fill="#27ae60">MarketSpeculator</text>
  <rect x="484" y="505" width="120" height="30" rx="5" fill="white" opacity="0.9"/>
  <text x="544" y="525" text-anchor="middle" font-size="9" fill="#27ae60">BioMedAnalyzer</text>
  <rect x="612" y="505" width="120" height="30" rx="5" fill="white" opacity="0.9"/>
  <text x="672" y="525" text-anchor="middle" font-size="9" fill="#27ae60">QualisDatasetHub</text>

  <!-- Segunda linha de hooks -->
  <rect x="164" y="540" width="120" height="30" rx="5" fill="white" opacity="0.9"/>
  <text x="224" y="560" text-anchor="middle" font-size="9" fill="#27ae60">WorldBankAnalyzer</text>
  <rect x="292" y="540" width="120" height="30" rx="5" fill="white" opacity="0.9"/>
  <text x="352" y="560" text-anchor="middle" font-size="9" fill="#27ae60">SeekerMultiSource</text>
  <rect x="420" y="540" width="120" height="30" rx="5" fill="white" opacity="0.9"/>
  <text x="480" y="560" text-anchor="middle" font-size="9" fill="#27ae60">PDFProcessor</text>
  <rect x="548" y="540" width="120" height="30" rx="5" fill="white" opacity="0.9"/>
  <text x="608" y="560" text-anchor="middle" font-size="9" fill="#27ae60">MCPScoutBridge</text>
  <rect x="676" y="540" width="120" height="30" rx="5" fill="white" opacity="0.9"/>
  <text x="736" y="560" text-anchor="middle" font-size="9" fill="#27ae60">HTTPXClient</text>

  <!-- Bibliotecas -->
  <text x="120" y="592" font-size="9" fill="#ecf0f1">Bibliotecas: yfinance · ccxt · geopandas · biopython · wbgapi · arxiv · scholarly · semanticscholar · pypdf · mcp · fastmcp · fredapi · folium · geopy · httpx</text>

  <!-- Rodapé -->
  <text x="480" y="614" text-anchor="middle" font-size="8" fill="#95a5a6">OpenCode Ecosystem v4.2 — data_orchestrator.py (592 linhas) — Maio 2026</text>
</svg>

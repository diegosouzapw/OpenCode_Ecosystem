<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 380" width="1100" height="380" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#2c3e50"/>
    </marker>
    <linearGradient id="gradSense" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gradDiscover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gradInstall" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1abc9c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16a085;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gradVerify" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gradEvolve" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gradLearn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Título -->
  <text x="550" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">Pipeline /evolve — Evolução Autônoma do Ecossistema OpenCode</text>
  <text x="550" y="52" text-anchor="middle" font-size="11" fill="#7f8c8d">Round 8 (PyPI Scout) + Round 9 (Expansão Multi-Domínio)</text>

  <!-- Etapa 1: SENSE -->
  <rect x="20" y="80" width="155" height="90" rx="10" fill="url(#gradSense)" opacity="0.95"/>
  <text x="97" y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="white">🔍 SENSE</text>
  <text x="97" y="128" text-anchor="middle" font-size="9" fill="#ecf0f1">Health check</text>
  <text x="97" y="143" text-anchor="middle" font-size="9" fill="#ecf0f1">Skills registry</text>
  <text x="97" y="158" text-anchor="middle" font-size="9" fill="#ecf0f1">CJK scan</text>

  <!-- Seta 1→2 -->
  <line x1="175" y1="125" x2="215" y2="125" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="193" y="118" text-anchor="middle" font-size="7" fill="#95a5a6">detecta</text>

  <!-- Etapa 2: DISCOVER -->
  <rect x="220" y="80" width="155" height="90" rx="10" fill="url(#gradDiscover)" opacity="0.95"/>
  <text x="297" y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="white">🔎 DISCOVER</text>
  <text x="297" y="128" text-anchor="middle" font-size="9" fill="#ecf0f1">Nova skill</text>
  <text x="297" y="143" text-anchor="middle" font-size="9" fill="#ecf0f1">Integrações</text>
  <text x="297" y="158" text-anchor="middle" font-size="9" fill="#ecf0f1">Oportunidades</text>

  <!-- Seta 2→3 -->
  <line x1="375" y1="125" x2="415" y2="125" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="393" y="118" text-anchor="middle" font-size="7" fill="#95a5a6">planeja</text>

  <!-- Etapa 3: INSTALL -->
  <rect x="420" y="80" width="155" height="90" rx="10" fill="url(#gradInstall)" opacity="0.95"/>
  <text x="497" y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="white">📦 INSTALL</text>
  <text x="497" y="128" text-anchor="middle" font-size="9" fill="white">pip install</text>
  <text x="497" y="143" text-anchor="middle" font-size="9" fill="white">7+ bibliotecas</text>
  <text x="497" y="158" text-anchor="middle" font-size="9" fill="white">30+ total</text>

  <!-- Seta 3→4 -->
  <line x1="575" y1="125" x2="615" y2="125" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="593" y="118" text-anchor="middle" font-size="7" fill="#95a5a6">valida</text>

  <!-- Etapa 4: VERIFY -->
  <rect x="620" y="80" width="155" height="90" rx="10" fill="url(#gradVerify)" opacity="0.95"/>
  <text x="697" y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="white">✅ VERIFY</text>
  <text x="697" y="128" text-anchor="middle" font-size="9" fill="white">Import test</text>
  <text x="697" y="143" text-anchor="middle" font-size="9" fill="white">CJK check</text>
  <text x="697" y="158" text-anchor="middle" font-size="9" fill="white">API validation</text>

  <!-- Seta 4→5 -->
  <line x1="775" y1="125" x2="815" y2="125" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="793" y="118" text-anchor="middle" font-size="7" fill="#95a5a6">gera</text>

  <!-- Etapa 5: EVOLVE -->
  <rect x="820" y="80" width="155" height="90" rx="10" fill="url(#gradEvolve)" opacity="0.95"/>
  <text x="897" y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="white">🧬 EVOLVE</text>
  <text x="897" y="128" text-anchor="middle" font-size="9" fill="#ecf0f1">Novos hooks</text>
  <text x="897" y="143" text-anchor="middle" font-size="9" fill="#ecf0f1">Patterns</text>
  <text x="897" y="158" text-anchor="middle" font-size="9" fill="#ecf0f1">Bridges</text>

  <!-- Seta 5→6 (curva) -->
  <path d="M 975 125 L 1010 125 L 1010 240 L 280 240 L 280 200" fill="none" stroke="#2c3e50" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <!-- Etapa 6: LEARN -->
  <rect x="40" y="260" width="250" height="55" rx="10" fill="url(#gradLearn)" opacity="0.95"/>
  <text x="165" y="283" text-anchor="middle" font-size="14" font-weight="bold" fill="white">🧠 LEARN</text>
  <text x="165" y="302" text-anchor="middle" font-size="9" fill="white">DecisionNode + Evolve State + mem0</text>

  <!-- Detalhes R8 -->
  <rect x="380" y="210" width="310" height="130" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="535" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Round 8 — PyPI Scout</text>
  <text x="400" y="252" font-size="9" fill="#34495e">• 22+ bibliotecas catalogadas</text>
  <text x="400" y="267" font-size="9" fill="#34495e">• 6 categorias, 5 pipelines</text>
  <text x="400" y="282" font-size="9" fill="#34495e">• 7 bibliotecas instaladas</text>
  <text x="400" y="297" font-size="9" fill="#34495e">• 5 hooks de integração</text>
  <text x="400" y="312" font-size="9" fill="#34495e">• 0 CJK leaks</text>
  <text x="400" y="327" font-size="9" fill="#34495e">• Registry: 43→44 skills</text>

  <!-- Detalhes R9 -->
  <rect x="730" y="210" width="310" height="130" rx="8" fill="#fdebd0" stroke="#f0b27a" stroke-width="1"/>
  <text x="885" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">Round 9 — Expansão Multi-Domínio</text>
  <text x="750" y="252" font-size="9" fill="#34495e">• 6 novos domínios (Geo, Finance, Crypto, BioMed, Health, Qualis A1)</text>
  <text x="750" y="267" font-size="9" fill="#34495e">• 5 novos hooks (+5 existentes = 10)</text>
  <text x="750" y="282" font-size="9" fill="#34495e">• 5 bibliotecas adicionais instaladas</text>
  <text x="750" y="297" font-size="9" fill="#34495e">• DataOrchestrator com query NL</text>
  <text x="750" y="312" font-size="9" fill="#34495e">• 8 domínios operacionais</text>
  <text x="750" y="327" font-size="9" fill="#34495e">• 20+ fontes Qualis A1</text>

  <!-- Rodapé -->
  <text x="550" y="370" text-anchor="middle" font-size="9" fill="#95a5a6">OpenCode Ecosystem v4.2 — Documentação Técnica — Maio 2026</text>
</svg>

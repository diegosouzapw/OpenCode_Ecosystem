<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <style>
      .title { font-size: 13px; font-weight: bold; fill: #1a5276; }
      .subtitle { font-size: 10px; font-weight: bold; fill: #1a5276; }
      .label { font-size: 9px; fill: #333; }
      .annot { font-size: 8px; fill: #e67e22; font-style: italic; }
      .cite { font-size: 7px; fill: #7f8c8d; }
      .step-box { fill: white; stroke: #1a5276; stroke-width: 2.5; rx: 10; }
      .step-highlight { fill: #fef9e7; stroke: #e67e22; stroke-width: 3; rx: 10; }
      .step-green { fill: #e8f8e8; stroke: #27ae60; stroke-width: 2.5; rx: 10; }
      .hyp-box { fill: #fff9f0; stroke: #e67e22; stroke-width: 1.8; rx: 6; }
      .author-chip { fill: #e8f4f8; stroke: #1a5276; stroke-width: 1; rx: 12; }
      .flow-arrow { stroke: #1a5276; stroke-width: 2.5; fill: none; }
      .feed-arrow { stroke: #e67e22; stroke-width: 1.5; fill: none; stroke-dasharray: 4,3; }
    </style>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#1a5276"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#e67e22"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#27ae60"/></marker>
  </defs>
  <rect width="1000" height="650" fill="white"/>
  <text x="500" y="22" text-anchor="middle" class="title" font-size="15">Fluxograma B — Raciocínio Lógico-Argumentativo do Artigo (Seções 1 e 7)</text>
  <line x1="80" y1="30" x2="920" y2="30" stroke="#1a5276" stroke-width="1"/>
  <text x="500" y="46" text-anchor="middle" font-size="9" fill="#7f8c8d">Sequência: Lacuna → Hipóteses → Delineamento → Descobertas → Validação → Conclusões — com fundamentação autoral explícita</text>

  <!-- Passo 1: LACUNA -->
  <g transform="translate(30,60)">
    <rect x="0" y="0" width="200" height="95" class="step-box"/>
    <text x="100" y="22" text-anchor="middle" font-size="9" fill="#1a5276" font-weight="bold">① LACUNA CIENTÍFICA</text>
    <text x="100" y="42" text-anchor="middle" font-size="7" fill="#333">Variabilidade CV=15-30%</text>
    <text x="100" y="56" text-anchor="middle" font-size="7" fill="#333">impede certificação</text>
    <text x="100" y="70" text-anchor="middle" font-size="7" fill="#333">automotiva de peças</text>
    <text x="100" y="84" text-anchor="middle" font-size="7" fill="#333">rotomoldadas</text>

    <!-- Autores -->
    <rect x="10" y="76" width="85" height="15" class="author-chip"/>
    <text x="52" y="87" text-anchor="middle" font-size="6" fill="#1a5276">Ren et al. 2021</text>
    <rect x="105" y="76" width="85" height="15" class="author-chip"/>
    <text x="147" y="87" text-anchor="middle" font-size="6" fill="#1a5276">Montgomery 2020</text>
  </g>

  <line x1="235" y1="107" x2="265" y2="107" class="flow-arrow" marker-end="url(#arrowBlue)"/>

  <!-- Passo 2: HIPÓTESES -->
  <g transform="translate(280,60)">
    <rect x="0" y="0" width="420" height="95" class="step-highlight"/>
    <text x="210" y="22" text-anchor="middle" font-size="9" fill="#e67e22" font-weight="bold">② HIPÓTESES (3 interligadas)</text>

    <!-- H1 -->
    <rect x="8" y="32" width="130" height="55" class="hyp-box"/>
    <text x="73" y="47" text-anchor="middle" font-size="7" fill="#e67e22" font-weight="bold">H1: VRA</text>
    <text x="73" y="59" text-anchor="middle" font-size="6" fill="#333">rGO como agente</text>
    <text x="73" y="71" text-anchor="middle" font-size="6" fill="#333">nucleante → reduz</text>
    <text x="73" y="83" text-anchor="middle" font-size="6" fill="#333">variância (paradoxo)</text>

    <!-- H2 -->
    <rect x="145" y="32" width="130" height="55" class="hyp-box"/>
    <text x="210" y="47" text-anchor="middle" font-size="7" fill="#e67e22" font-weight="bold">H2: Não-Monotônica</text>
    <text x="210" y="59" text-anchor="middle" font-size="6" fill="#333">Sinergia rGO×PP-g-MA</text>
    <text x="210" y="71" text-anchor="middle" font-size="6" fill="#333">máx. em concentração</text>
    <text x="210" y="83" text-anchor="middle" font-size="6" fill="#333">crítica → colapso</text>

    <!-- H3 -->
    <rect x="282" y="32" width="130" height="55" class="hyp-box"/>
    <text x="347" y="47" text-anchor="middle" font-size="7" fill="#e67e22" font-weight="bold">H3: Transferibilidade</text>
    <text x="347" y="59" text-anchor="middle" font-size="6" fill="#333">Propriedades de</text>
    <text x="347" y="71" text-anchor="middle" font-size="6" fill="#333">rotomoldagem previstas</text>
    <text x="347" y="83" text-anchor="middle" font-size="6" fill="#333">via PCR (erro&lt;10%)</text>

    <!-- Autores -->
    <rect x="30" y="60" width="75" height="13" rx="10" fill="#e8f4f8" stroke="#1a5276" stroke-width="0.8"/>
    <text x="67" y="69" text-anchor="middle" font-size="5.5" fill="#1a5276">Taguchi 1986</text>
    <rect x="170" y="60" width="75" height="13" rx="10" fill="#fef9e7" stroke="#e67e22" stroke-width="0.8"/>
    <text x="207" y="69" text-anchor="middle" font-size="5.5" fill="#e67e22">Langmuir 1918</text>
    <rect x="310" y="60" width="75" height="13" rx="10" fill="#e8f4f8" stroke="#1a5276" stroke-width="0.8"/>
    <text x="347" y="69" text-anchor="middle" font-size="5.5" fill="#1a5276">Ising 1925</text>
  </g>

  <line x1="720" y1="107" x2="750" y2="107" class="flow-arrow" marker-end="url(#arrowBlue)"/>

  <!-- Passo 3: DELINEAMENTO -->
  <g transform="translate(760,60)">
    <rect x="0" y="0" width="200" height="95" class="step-box"/>
    <text x="100" y="22" text-anchor="middle" font-size="9" fill="#1a5276" font-weight="bold">③ DELINEAMENTO</text>
    <text x="100" y="42" text-anchor="middle" font-size="7" fill="#333">Fatorial 2×3 completo</text>
    <text x="100" y="56" text-anchor="middle" font-size="7" fill="#333">+ controle PP-g-MA</text>
    <text x="100" y="70" text-anchor="middle" font-size="7" fill="#333">isolado (T2), n=12+16</text>
    <text x="100" y="84" text-anchor="middle" font-size="7" fill="#333">ANOVA, Bootstrap, PCR</text>

    <rect x="55" y="76" width="90" height="15" class="author-chip"/>
    <text x="100" y="87" text-anchor="middle" font-size="6" fill="#1a5276">Montgomery 2020</text>
  </g>

  <!-- Seta para baixo (grande transição) -->
  <line x1="500" y1="160" x2="500" y2="195" stroke="#27ae60" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <text x="515" y="183" font-size="8" fill="#27ae60" font-weight="bold">EXECUÇÃO EXPERIMENTAL (Seções 2-3)</text>

  <!-- Passo 4: DESCOBERTAS (3 colunas) -->
  <g transform="translate(30,210)">
    <rect x="0" y="0" width="940" height="170" rx="8" fill="#fdfdf8" stroke="#27ae60" stroke-width="2"/>
    <text x="470" y="22" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">④ DESCOBERTAS (3 Fenômenos Inéditos — Seções 4-6)</text>

    <!-- Descoberta 1 -->
    <rect x="15" y="35" width="290" height="120" class="step-green"/>
    <text x="160" y="55" text-anchor="middle" font-size="8" fill="#27ae60" font-weight="bold">D1: EFEITO VRA</text>
    <text x="160" y="72" text-anchor="middle" font-size="7.5" fill="#333">CV Módulo: 25,6% → 16,0%</text>
    <text x="160" y="87" text-anchor="middle" font-size="7.5" fill="#27ae60" font-weight="bold">↓37,5% (p=0,003)</text>
    <text x="160" y="102" text-anchor="middle" font-size="6.5" fill="#333">3 provas: Brown-Forsythe,</text>
    <text x="160" y="115" text-anchor="middle" font-size="6.5" fill="#333">teste t (d=0,92), bootstrap 97,3%</text>
    <text x="160" y="130" text-anchor="middle" font-size="6.5" fill="#333">Mecanismo: nucleação+k_eff+restrição</text>
    <text x="160" y="148" text-anchor="middle" font-size="5.5" fill="#7f8c8d">→ H1 CONFIRMADA</text>

    <!-- Descoberta 2 -->
    <rect x="325" y="35" width="290" height="120" class="step-highlight"/>
    <text x="470" y="55" text-anchor="middle" font-size="8" fill="#e67e22" font-weight="bold">D2: SINERGIA NÃO-MONOTÔNICA</text>
    <text x="470" y="72" text-anchor="middle" font-size="7.5" fill="#333">Langmuir: K=0,032%, γ=8,7, R²=0,94</text>
    <text x="470" y="87" text-anchor="middle" font-size="7.5" fill="#e67e22" font-weight="bold">Superaditivo→Aditivo→Antagônico</text>
    <text x="470" y="102" text-anchor="middle" font-size="6.5" fill="#333">Analogia formal Ising (1925):</text>
    <text x="470" y="115" text-anchor="middle" font-size="6.5" fill="#333">transição cooperativo→não-cooperativo</text>
    <text x="470" y="130" text-anchor="middle" font-size="6.5" fill="#333">T_10% max +26°C a 0,05% e regressão</text>
    <text x="470" y="148" text-anchor="middle" font-size="5.5" fill="#7f8c8d">→ H2 CONFIRMADA</text>

    <!-- Descoberta 3 -->
    <rect x="635" y="35" width="290" height="120" class="step-box"/>
    <text x="780" y="55" text-anchor="middle" font-size="8" fill="#1a5276" font-weight="bold">D3: DIGITAL TWIN PCR</text>
    <text x="780" y="72" text-anchor="middle" font-size="7.5" fill="#333">PCR LOOCV: R²=0,93 (módulo)</text>
    <text x="780" y="87" text-anchor="middle" font-size="7.5" fill="#1a5276" font-weight="bold">Erro &lt; 4%</text>
    <text x="780" y="102" text-anchor="middle" font-size="6.5" fill="#333">β_std(T_10%)=0,47 (dominante)</text>
    <text x="780" y="115" text-anchor="middle" font-size="6.5" fill="#333">φ_c≈0,02% (∼10× abaixo previsto)</text>
    <text x="780" y="130" text-anchor="middle" font-size="6.5" fill="#333">Matriz 12×12: T_10%↔Impacto r=0,89</text>
    <text x="780" y="148" text-anchor="middle" font-size="5.5" fill="#7f8c8d">→ H3 CONFIRMADA</text>
  </g>

  <!-- Feedback loop -->
  <path d="M940,380 Q970,380 970,295 Q970,107 940,107" stroke="#e67e22" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <text x="975" y="250" font-size="6.5" fill="#e67e22" font-weight="bold" transform="rotate(90,975,250)">RETROALIMENTAÇÃO</text>

  <!-- Seta para validação -->
  <line x1="500" y1="385" x2="500" y2="420" stroke="#1a5276" stroke-width="3" marker-end="url(#arrowBlue)"/>

  <!-- Passo 5: VALIDAÇÃO -->
  <g transform="translate(50,428)">
    <rect x="0" y="0" width="400" height="90" class="step-box"/>
    <text x="200" y="22" text-anchor="middle" font-size="9" fill="#1a5276" font-weight="bold">⑤ VALIDAÇÃO CRUZADA (Seções 5-6)</text>
    <text x="200" y="42" text-anchor="middle" font-size="7.5" fill="#333">Otimização Multiobjetivo: Pareto (3/6) + Shapley (66%/34%)</text>
    <text x="200" y="57" text-anchor="middle" font-size="7.5" fill="#333">Nash (λ∈[0,1;1,8]) + Minimax (CV↓37,5%)</text>
    <text x="200" y="72" text-anchor="middle" font-size="7.5" fill="#e67e22" font-weight="bold">→ CONVERGÊNCIA em T5 (0,05%rGO+0,05%PP-g-MA)</text>
    <text x="200" y="87" text-anchor="middle" font-size="6.5" fill="#7f8c8d">LCA ISO 14040: −10,7% CO₂/peça | Custo US$ 0,12/kg</text>
  </g>

  <line x1="455" y1="473" x2="500" y2="473" class="flow-arrow" marker-end="url(#arrowBlue)"/>

  <!-- Passo 6: CONCLUSÕES -->
  <g transform="translate(510,428)">
    <rect x="0" y="0" width="450" height="90" class="step-highlight"/>
    <text x="225" y="22" text-anchor="middle" font-size="9" fill="#e67e22" font-weight="bold">⑥ CONCLUSÕES E IMPLICAÇÕES (Seção 7)</text>
    <text x="225" y="42" text-anchor="middle" font-size="7.5" fill="#333">8 conclusões auditáveis com evidência quantitativa</text>
    <text x="225" y="57" text-anchor="middle" font-size="7.5" fill="#333">VRA (p=0,003) | Langmuir (R²=0,94) | PCR (R²=0,93)</text>
    <text x="225" y="72" text-anchor="middle" font-size="7.5" fill="#e67e22" font-weight="bold">rGO como VRA + Digital Twin → redução 80% tempo P&amp;D</text>
    <text x="225" y="87" text-anchor="middle" font-size="6.5" fill="#7f8c8d">Trabalhos futuros: validação multi-geometria, Raman/TEM in-situ, fadiga, scale-up</text>
  </g>

  <!-- Barra de fundamentação autoral -->
  <g transform="translate(30,540)">
    <rect x="0" y="0" width="940" height="50" rx="6" fill="#f0f4f7" stroke="#7f8c8d" stroke-width="1"/>
    <text x="470" y="16" text-anchor="middle" font-size="8" fill="#1a5276" font-weight="bold">FUNDAMENTAÇÃO AUTORAL (cada passo conectado a autores específicos)</text>
    <text x="470" y="32" text-anchor="middle" font-size="6.5" fill="#555">
      Taguchi (1986) → H1 VRA | Langmuir (1918) + Ising (1925) → H2 Não-Monotônica | Montgomery (2020) → Delineamento | Ferrari (2000) → Raman | Lee (2008) → Grafeno |
      Cohen (1988) → Correlação | Nash (1950) + Shapley (1953) + von Neumann (1928) → Otimização | ISO 14040 → LCA
    </text>
    <text x="470" y="46" text-anchor="middle" font-size="6.5" fill="#7f8c8d">
      Celzard (1996) → Percolação | Menard (2020) → DMA | Somberg (2022) → Nanocompósitos PE/LCA | Pareto (1906) → Eficiência | Davim (2008) → Corte laser
    </text>
  </g>

  <!-- Legenda final -->
  <text x="500" y="620" text-anchor="middle" class="annot" font-size="9">
    Legenda: O raciocínio do artigo segue a sequência Lacuna→Hipóteses→Delineamento→Descobertas→Validação→Conclusões.
    Cada bloco é explicitamente fundamentado em autores citados (DOIs auditáveis), conectando os 3 fenômenos inéditos
    (VRA, sinergia não-monotônica, digital twin PCR) em uma narrativa coesa e verificável.
  </text>

</svg>
  <!-- Estatísticas -->
  <g transform="translate(30,40)">
    <rect x="0" y="0" width="210" height="70" rx="4" fill="white" stroke="#1a5276" stroke-width="1"/>
    <text x="105" y="14" text-anchor="middle" font-size="8" fill="#1a5276" font-weight="bold">Parâmetros Estatísticos</text>
    <text x="10" y="28" font-size="7" fill="#333">α_corrigido (Bonferroni): 0,00076</text>
    <text x="10" y="41" font-size="7" fill="#333">66 comparações (12×11/2)</text>
    <text x="10" y="54" font-size="7" fill="#333">|r| &gt; 0,7 → correlação forte (Cohen 1988)</text>
    <text x="10" y="66" font-size="7" fill="#333">α=0,05 padrão; FWER corrigido</text>
  </g>

  <!-- Legenda geral -->
  <text x="450" y="710" text-anchor="middle" class="cite" font-size="8">
    Legenda: Matriz Pearson 12×12 revela T_10% como preditor dominante da tenacidade (r=0,89, p&lt;0,001). Correlação negativa CV↔η* (r=−0,68) sugere reologia como métrica de controle de processo.
    O dendrograma identifica 3 clusters naturais: térmicas, mecânicas e de controle de processo.
  </text>

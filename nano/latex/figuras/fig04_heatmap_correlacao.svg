    <line x1="40" y1="35" x2="160" y2="35" stroke="#1a5276" stroke-width="1.5"/>
    <line x1="40" y1="95" x2="160" y2="95" stroke="#1a5276" stroke-width="1.5"/>

    <!-- Cluster 1: Térmicas -->
    <text x="20" y="50" font-size="7" fill="#1a5276" font-weight="bold">Cluster 1:</text>
    <text x="25" y="62" font-size="6.5" fill="#333">T_10%, T_50%, DTG</text>
    <text x="25" y="74" font-size="6.5" fill="#333">(Térmicas, r>0,85)</text>


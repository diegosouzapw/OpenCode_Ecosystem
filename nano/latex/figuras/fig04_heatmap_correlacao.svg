    <line x1="50" y1="35" x2="50" y2="140" stroke="#1a5276" stroke-width="0.8" stroke-dasharray="2,2"/>
    <line x1="30" y1="140" x2="70" y2="140" stroke="#1a5276" stroke-width="0.8"/>

    <!-- Implicação -->
    <rect x="10" y="200" width="210" height="80" rx="6" fill="#fef9e7" stroke="#e67e22" stroke-width="1.5"/>
    <text x="115" y="218" font-size="7.5" fill="#e67e22" text-anchor="middle" font-weight="bold">⚡ Implicação Fundamental</text>
    <text x="115" y="233" font-size="7" fill="#333" text-anchor="middle">T_10% (TGA) = preditor dominante</text>
    <text x="115" y="246" font-size="7" fill="#333" text-anchor="middle">da tenacidade (r = 0,89, p&lt;0,001)</text>
    <text x="115" y="259" font-size="7" fill="#333" text-anchor="middle">→ Triagem rápida, reduz ensaios destrutivos</text>
    <text x="115" y="272" font-size="7" fill="#e67e22" text-anchor="middle">CV↔η*: r=−0,68 → reologia como controle</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <style>
      .title { font-size: 13px; font-weight: bold; fill: #1a5276; }
      .subtitle { font-size: 10px; font-weight: bold; fill: #1a5276; }
      .label { font-size: 9px; fill: #333; }
      .annot { font-size: 8px; fill: #e67e22; font-style: italic; }
      .cite { font-size: 7px; fill: #7f8c8d; }
      .quad { fill: white; stroke: #1a5276; stroke-width: 2; rx: 10; }
      .converge-arrow { stroke: #e67e22; stroke-width: 3; fill: none; }
    </style>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#e67e22"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#27ae60"/></marker>
  </defs>
  <rect width="900" height="680" fill="white"/>
  <text x="450" y="22" text-anchor="middle" class="title" font-size="15">Figura 7 — Diagrama da Otimização Multiobjetivo via Teoria dos Jogos</text>
  <line x1="80" y1="30" x2="820" y2="30" stroke="#1a5276" stroke-width="1"/>

  <!-- 4 Quadrantes + centro de convergência -->
  <!-- Q1: Pareto (superior esquerdo) -->
  <g transform="translate(20,38)">
    <rect x="0" y="0" width="410" height="250" class="quad"/>
    <rect x="0" y="0" width="410" height="30" rx="10" fill="#1a5276"/>
    <rect x="0" y="15" width="410" height="15" fill="#1a5276"/>
    <text x="205" y="20" text-anchor="middle" font-size="11" fill="white" font-weight="bold">① FRONTEIRA DE PARETO</text>

    <!-- Eficiência -->
    <text x="15" y="48" font-size="8" fill="#1a5276" font-weight="bold">Conceito: x ∈ P := {x ∈ F | ∄ y ∈ F: y ≻ x}</text>
    <text x="15" y="62" font-size="7.5" fill="#333">Das 6 formulações, apenas 3 são não-dominadas:</text>

    <rect x="25" y="72" width="360" height="22" rx="4" fill="#e8f8e8" stroke="#27ae60" stroke-width="1"/>
    <text x="35" y="87" font-size="7.5" fill="#333">✓ T3 (0,05rGO) — menor custo com rGO</text>

    <rect x="25" y="98" width="360" height="22" rx="4" fill="#e8f8e8" stroke="#27ae60" stroke-width="1"/>
    <text x="35" y="113" font-size="7.5" fill="#333">✓ T4 (0,10rGO) — máxima tensão de flexão (17,04 MPa)</text>

    <rect x="25" y="124" width="360" height="22" rx="4" fill="#fef9e7" stroke="#e67e22" stroke-width="2"/>
    <text x="35" y="139" font-size="7.5" fill="#e67e22" font-weight="bold">★ T5 (0,05rGO+PP-g-MA) — máx. Módulo, T_10%, T_50%</text>

    <text x="15" y="170" font-size="7" fill="#7f8c8d">T1 e T2 são dominadas em múltiplas dimensões</text>

    <!-- Mini gráfico Pareto -->
    <circle cx="100" cy="215" r="4" fill="#e74c3c"/>
    <text x="108" y="218" font-size="6.5" fill="#e74c3c">Dominadas (T1,T2)</text>
    <circle cx="100" cy="235" r="4" fill="#27ae60"/>
    <text x="108" y="238" font-size="6.5" fill="#27ae60">Eficientes (T3,T4,T5)</text>

    <text x="15" y="258" class="cite">[Pareto, Manuale di Economia Politica (1906)]</text>
  </g>

  <!-- Q2: Shapley (superior direito) -->
  <g transform="translate(450,38)">
    <rect x="0" y="0" width="430" height="250" class="quad"/>
    <rect x="0" y="0" width="430" height="30" rx="10" fill="#1a5276"/>
    <rect x="0" y="15" width="430" height="15" fill="#1a5276"/>
    <text x="215" y="20" text-anchor="middle" font-size="11" fill="white" font-weight="bold">② VALOR DE SHAPLEY</text>

    <text x="15" y="48" font-size="8" fill="#1a5276" font-weight="bold">φ_i = Σ_S [|S|!(|N|-|S|-1)!/|N|!]·[v(S∪{i}) - v(S)]</text>
    <text x="15" y="62" font-size="7.5" fill="#333">N = {rGO, PP-g-MA}, contribuições marginais (Módulo):</text>

    <!-- Barra rGO -->
    <rect x="30" y="75" width="350" height="28" rx="5" fill="#e8f4f8" stroke="#1a5276" stroke-width="1"/>
    <rect x="30" y="75" width="231" height="28" rx="5" fill="#1a5276"/>
    <text x="40" y="93" font-size="8" fill="white" font-weight="bold">rGO: 66%</text>
    <text x="260" y="93" font-size="7" fill="#1a5276">φ_rGO = 6,3%</text>

    <!-- Barra PP-g-MA -->
    <rect x="30" y="112" width="350" height="28" rx="5" fill="#e8f4f8" stroke="#e67e22" stroke-width="1"/>
    <rect x="30" y="112" width="119" height="28" rx="5" fill="#e67e22"/>
    <text x="40" y="130" font-size="8" fill="white" font-weight="bold">PP-g-MA: 34%</text>
    <text x="155" y="130" font-size="7" fill="#e67e22">φ_PP-g-MA = 3,2%</text>

    <!-- Cálculo detalhado -->
    <rect x="15" y="155" width="400" height="55" rx="5" fill="#fef9e7" stroke="#e67e22" stroke-width="0.8"/>
    <text x="25" y="170" font-size="7" fill="#333" font-weight="bold">Cálculo (com controle T2 — PP-g-MA isolado):</text>
    <text x="25" y="183" font-size="7" fill="#333">v({rGO}) = 4,1%  |  v({PP-g-MA}) = 1,0% (T2 vs T1)</text>
    <text x="25" y="196" font-size="7" fill="#333">v({rGO, PP-g-MA}) = 9,5% (T5 vs T1)</text>
    <text x="25" y="209" font-size="6.5" fill="#7f8c8d">Sinergia: S = 9,5 − (4,1 + 1,0) = +4,4%</text>

    <text x="15" y="258" class="cite">[Shapley, Contributions to Theory of Games, Vol.2 (1953). DOI: 10.1515/9781400881970-018]</text>
  </g>

  <!-- Q3: Nash (inferior esquerdo) -->
  <g transform="translate(20,305)">
    <rect x="0" y="0" width="410" height="220" class="quad"/>
    <rect x="0" y="0" width="410" height="30" rx="10" fill="#1a5276"/>
    <rect x="0" y="15" width="410" height="15" fill="#1a5276"/>
    <text x="205" y="20" text-anchor="middle" font-size="11" fill="white" font-weight="bold">③ EQUILÍBRIO DE NASH</text>

    <text x="15" y="48" font-size="8" fill="#1a5276" font-weight="bold">x* = argmax_x [p̄(x) − λ·c(x)]</text>
    <text x="15" y="62" font-size="7.5" fill="#333">Dois jogadores: U_D (desempenho), U_M (minimizar variância)</text>

    <!-- Funções -->
    <text x="25" y="82" font-size="7.5" fill="#333">U_D = p̄ − λ·c  (utilidade do designer)</text>
    <text x="25" y="97" font-size="7.5" fill="#333">U_M = −(p̄ − p_min)²  (utilidade do fabricante)</text>

    <!-- Matriz de payoff -->
    <rect x="25" y="110" width="360" height="55" rx="5" fill="#e8f8e8" stroke="#27ae60" stroke-width="1.2"/>
    <text x="205" y="128" text-anchor="middle" font-size="7.5" fill="#27ae60" font-weight="bold">Resultado: x* = T5 (0,05% rGO + 0,05% PP-g-MA)</text>
    <text x="205" y="143" text-anchor="middle" font-size="7" fill="#333">Análise de sensibilidade: λ ∈ [0,1; 1,8]</text>
    <text x="205" y="157" text-anchor="middle" font-size="7" fill="#333">T5 permanece equilíbrio → robustez da decisão</text>

    <text x="15" y="195" font-size="7" fill="#7f8c8d">λ = 0,5 (peso balanceado desempenho/custo)</text>
    <text x="15" y="210" class="cite">[Nash, PNAS 36, 48 (1950). DOI: 10.1073/pnas.36.1.48]</text>
  </g>

  <!-- Q4: Minimax (inferior direito) -->
  <g transform="translate(450,305)">
    <rect x="0" y="0" width="430" height="220" class="quad"/>
    <rect x="0" y="0" width="430" height="30" rx="10" fill="#1a5276"/>
    <rect x="0" y="15" width="430" height="15" fill="#1a5276"/>
    <text x="215" y="20" text-anchor="middle" font-size="11" fill="white" font-weight="bold">④ ESTRATÉGIA MINIMAX</text>

    <text x="15" y="48" font-size="8" fill="#1a5276" font-weight="bold">a* = argmin_a max_θ L(a,θ),  L = CV_Módulo</text>

    <!-- Tabela comparativa -->
    <rect x="25" y="60" width="180" height="55" rx="5" fill="#fdf2f2" stroke="#e74c3c" stroke-width="1.2"/>
    <text x="115" y="76" text-anchor="middle" font-size="8" fill="#e74c3c" font-weight="bold">Pior Caso (PELBD-R)</text>
    <text x="115" y="93" text-anchor="middle" font-size="7.5" fill="#333">CV = 25,6%</text>
    <text x="115" y="108" text-anchor="middle" font-size="7" fill="#7f8c8d">Perda máxima alta</text>

    <rect x="225" y="60" width="180" height="55" rx="5" fill="#e8f8e8" stroke="#27ae60" stroke-width="1.5"/>
    <text x="315" y="76" text-anchor="middle" font-size="8" fill="#27ae60" font-weight="bold">Minimax (Nano-R)</text>
    <text x="315" y="93" text-anchor="middle" font-size="7.5" fill="#333">CV = 16,0%</text>
    <text x="315" y="108" text-anchor="middle" font-size="7" fill="#7f8c8d">Redução 37,5%</text>

    <!-- Conexão -->
    <line x1="205" y1="88" x2="225" y2="88" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

    <rect x="25" y="130" width="380" height="45" rx="5" fill="#fef9e7" stroke="#e67e22" stroke-width="1"/>
    <text x="215" y="148" text-anchor="middle" font-size="7.5" fill="#333">Minimax seleciona Nanocompósito-R → reduz perda máxima em 37,5%</text>
    <text x="215" y="163" text-anchor="middle" font-size="7" fill="#7f8c8d">Análogo ao robust design de Taguchi (1986): minimizar sensibilidade ao ruído</text>

    <text x="15" y="195" class="cite">[von Neumann, Mathematische Annalen 100, 295 (1928). DOI: 10.1007/BF01448847]</text>
    <text x="15" y="207" class="cite">[Taguchi, Introduction to Quality Engineering. APO (1986)]</text>
  </g>

  <!-- Centro de convergência e fluxo de decisão -->
  <g transform="translate(300,555)">
    <!-- Seta convergente dos 4 quadrantes -->
    <line x1="0" y1="0" x2="140" y2="50" stroke="#e67e22" stroke-width="3" marker-end="url(#arrowOrange)"/>
    <line x1="300" y1="0" x2="160" y2="50" stroke="#e67e22" stroke-width="3" marker-end="url(#arrowOrange)"/>
    <line x1="0" y1="100" x2="140" y2="50" stroke="#e67e22" stroke-width="3" marker-end="url(#arrowOrange)"/>
    <line x1="300" y1="100" x2="160" y2="50" stroke="#e67e22" stroke-width="3" marker-end="url(#arrowOrange)"/>

    <!-- Círculo central -->
    <circle cx="150" cy="50" r="45" fill="#e67e22" opacity="0.15" stroke="#e67e22" stroke-width="3"/>
    <text x="150" y="42" text-anchor="middle" font-size="10" fill="#e67e22" font-weight="bold">CONVERGÊNCIA</text>
    <text x="150" y="58" text-anchor="middle" font-size="9" fill="#e67e22" font-weight="bold">T5 (0,05%)</text>
    <text x="150" y="73" text-anchor="middle" font-size="7" fill="#333">Ótimo Multiobjetivo</text>

    <!-- Otimização Bayesiana -->
    <text x="150" y="110" text-anchor="middle" font-size="8" fill="#1a5276" font-weight="bold">+ Otimização Bayesiana (EI, ξ=0,01)</text>
    <text x="150" y="125" text-anchor="middle" font-size="7.5" fill="#333">Ótimo global previsto: ∼0,04% rGO / 0,03% PP-g-MA</text>
    <text x="150" y="140" text-anchor="middle" font-size="7" fill="#7f8c8d">Ganho marginal +1,2% no módulo (500 iterações Monte Carlo)</text>
  </g>

  <!-- Legenda geral -->
  <text x="450" y="650" text-anchor="middle" class="annot" font-size="9">
    Legenda: Quatro critérios independentes de Teoria dos Jogos convergem para T5 (0,05% rGO + 0,05% PP-g-MA) como formulação ótima.
    Pareto identifica 3/6 não-dominadas, Shapley quantifica contribuição rGO=66%/PP-g-MA=34%, Nash confirma equilíbrio robusto (λ∈[0,1;1,8]),
    Minimax reduz perda máxima em 37,5%. Otimização Bayesiana refina o ótimo global para ∼0,04%/0,03%.
  </text>
</svg>
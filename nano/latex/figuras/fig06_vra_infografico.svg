<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <style>
      .title { font-size: 13px; font-weight: bold; fill: #1a5276; }
      .subtitle { font-size: 11px; font-weight: bold; fill: #1a5276; }
      .label { font-size: 9px; fill: #333; }
      .annot { font-size: 8px; fill: #e67e22; font-style: italic; }
      .cite { font-size: 7px; fill: #7f8c8d; }
      .box { fill: none; stroke: #7f8c8d; stroke-width: 1; }
      .card { fill: white; stroke: #1a5276; stroke-width: 1.5; rx: 8; }
      .card-orange { fill: #fef9e7; stroke: #e67e22; stroke-width: 2; rx: 8; }
      .card-green { fill: #e8f8e8; stroke: #27ae60; stroke-width: 1.5; rx: 8; }
    </style>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#1a5276"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#e67e22"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#27ae60"/></marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#e74c3c"/></marker>
  </defs>
  <rect width="900" height="720" fill="white"/>
  <text x="450" y="22" text-anchor="middle" class="title" font-size="15">Figura 6 — Infográfico do Efeito de Redução de Variância (VRA)</text>
  <line x1="80" y1="30" x2="820" y2="30" stroke="#1a5276" stroke-width="1"/>
  <text x="450" y="48" text-anchor="middle" class="annot" font-size="9">CV do Módulo: 25,6% → 16,0% | Redução de 37,5% | p = 0,003</text>

  <!-- Painel central: Seta grande da redução -->
  <g transform="translate(250,60)">
    <!-- Barra esquerda: CV PELBD -->
    <rect x="0" y="0" width="100" height="100" rx="10" fill="#fdf2f2" stroke="#e74c3c" stroke-width="2"/>
    <text x="50" y="35" text-anchor="middle" font-size="24" fill="#e74c3c" font-weight="bold">25,6%</text>
    <text x="50" y="55" text-anchor="middle" font-size="8" fill="#e74c3c">CV Módulo</text>
    <text x="50" y="68" text-anchor="middle" font-size="7" fill="#333">PELBD-R</text>
    <text x="50" y="82" text-anchor="middle" font-size="7" fill="#7f8c8d">±124,2 MPa</text>

    <!-- Seta central -->
    <path d="M120,50 L220,50" stroke="#27ae60" stroke-width="5" marker-end="url(#arrowGreen)"/>
    <text x="170" y="40" text-anchor="middle" font-size="13" fill="#27ae60" font-weight="bold">↓ 37,5%</text>
    <text x="170" y="52" text-anchor="middle" font-size="7.5" fill="#27ae60">p = 0,003</text>

    <!-- Barra direita: CV Nanocompósito -->
    <rect x="240" y="0" width="100" height="100" rx="10" fill="#e8f8e8" stroke="#27ae60" stroke-width="2"/>
    <text x="290" y="35" text-anchor="middle" font-size="24" fill="#27ae60" font-weight="bold">16,0%</text>
    <text x="290" y="55" text-anchor="middle" font-size="8" fill="#27ae60">CV Módulo</text>
    <text x="290" y="68" text-anchor="middle" font-size="7" fill="#333">0,05rGO+PP-g-MA-R</text>
    <text x="290" y="82" text-anchor="middle" font-size="7" fill="#7f8c8d">±93,7 MPa</text>

    <!-- Distinção VRA -->
    <rect x="380" y="10" width="140" height="80" rx="8" fill="#fef9e7" stroke="#e67e22" stroke-width="2"/>
    <text x="450" y="32" text-anchor="middle" font-size="9" fill="#e67e22" font-weight="bold">★ PRIMEIRA DEMONSTRAÇÃO</text>
    <text x="450" y="48" text-anchor="middle" font-size="8" fill="#333">de Variance Reduction</text>
    <text x="450" y="63" text-anchor="middle" font-size="8" fill="#333">Agent (VRA) em</text>
    <text x="450" y="78" text-anchor="middle" font-size="8" fill="#333">manufatura polimérica</text>
  </g>

  <!-- Três provas independentes -->
  <g transform="translate(20,175)">
    <rect x="0" y="0" width="860" height="80" rx="8" fill="white" stroke="#1a5276" stroke-width="1.5"/>
    <text x="430" y="18" text-anchor="middle" class="subtitle">Três Provas Independentes de Heterocedasticidade</text>

    <!-- Prova 1 -->
    <rect x="15" y="28" width="260" height="42" rx="5" fill="#fef9e7" stroke="#e67e22" stroke-width="1.2"/>
    <text x="145" y="42" text-anchor="middle" font-size="8" fill="#e67e22" font-weight="bold">Prova 1: Brown-Forsythe</text>
    <text x="145" y="58" text-anchor="middle" font-size="7.5" fill="#333">F(1,30) = 10,47  |  p = 0,003</text>
    <text x="145" y="69" text-anchor="middle" font-size="6.5" fill="#7f8c8d">σ²_PELBD / σ²_Nano = 1,76 [1,28; 2,51]</text>

    <!-- Prova 2 -->
    <rect x="295" y="28" width="260" height="42" rx="5" fill="#e8f8e8" stroke="#27ae60" stroke-width="1.2"/>
    <text x="425" y="42" text-anchor="middle" font-size="8" fill="#27ae60" font-weight="bold">Prova 2: Teste t (poder adequado)</text>
    <text x="425" y="58" text-anchor="middle" font-size="7.5" fill="#333">t(30) = −2,592  |  p = 0,015  |  d = 0,92</text>
    <text x="425" y="69" text-anchor="middle" font-size="6.5" fill="#7f8c8d">1−β = 0,82 (alvo 0,80 atingido)</text>

    <!-- Prova 3 -->
    <rect x="575" y="28" width="270" height="42" rx="5" fill="#e8f4f8" stroke="#1a5276" stroke-width="1.2"/>
    <text x="710" y="42" text-anchor="middle" font-size="8" fill="#1a5276" font-weight="bold">Prova 3: Bootstrap Robusto</text>
    <text x="710" y="58" text-anchor="middle" font-size="7.5" fill="#333">97,3% de 1.000 iterações</text>
    <text x="710" y="69" text-anchor="middle" font-size="6.5" fill="#7f8c8d">Subconjuntos n=8; BCa; B=10.000</text>
  </g>

  <!-- Mecanismos do VRA (3 painéis) -->
  <g transform="translate(20,265)">
    <text x="430" y="15" text-anchor="middle" class="subtitle">Mecanismos do VRA — Três Fatores Sinérgicos</text>

    <!-- (a) Nucleação uniformizada -->
    <rect x="0" y="25" width="270" height="140" class="card"/>
    <text x="135" y="45" text-anchor="middle" font-size="9" fill="#1a5276" font-weight="bold">(a) Nucleação Uniformizada</text>
    <!-- Esferulitos estilizados -->
    <circle cx="60" cy="85" r="18" fill="none" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,2"/>
    <circle cx="60" cy="85" r="8" fill="#1a5276" opacity="0.3"/>
    <text x="60" y="110" text-anchor="middle" font-size="6" fill="#e74c3c">18±8 μm</text>
    <text x="60" y="120" text-anchor="middle" font-size="5.5" fill="#7f8c8d">PELBD puro</text>

    <line x1="90" y1="85" x2="110" y2="85" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowGreen)"/>

    <circle cx="160" cy="85" r="8" fill="none" stroke="#27ae60" stroke-width="1.5"/>
    <circle cx="160" cy="85" r="5" fill="#1a5276" opacity="0.5"/>
    <text x="160" y="110" text-anchor="middle" font-size="6" fill="#27ae60">8±3 μm</text>
    <text x="160" y="120" text-anchor="middle" font-size="5.5" fill="#7f8c8d">Nanocompósito</text>

    <text x="135" y="148" text-anchor="middle" font-size="6.5" fill="#333">ρ_N ≈ 10^14 m^−2 >> nucleação homogênea</text>
    <text x="135" y="160" text-anchor="middle" font-size="6" fill="#7f8c8d">(TEM/AFM — restrição esferulítica)</text>

    <!-- (b) Condutividade térmica -->
    <rect x="290" y="25" width="270" height="140" class="card"/>
    <text x="425" y="45" text-anchor="middle" font-size="9" fill="#1a5276" font-weight="bold">(b) Condutividade Térmica</text>
    <!-- Gradiente -->
    <rect x="320" y="65" width="200" height="12" fill="#e74c3c" opacity="0.3" rx="3"/>
    <text x="320" y="78" font-size="6" fill="#e74c3c">∇T elevado (resfriamento lento)</text>
    <line x1="330" y1="92" x2="330" y2="105" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <rect x="320" y="108" width="90" height="12" fill="#27ae60" opacity="0.3" rx="3"/>
    <text x="320" y="120" font-size="6" fill="#27ae60">∇T reduzido</text>

    <text x="425" y="148" text-anchor="middle" font-size="6.5" fill="#333">k_eff ↑ → gradientes térmicos uniformizados</text>
    <text x="425" y="160" text-anchor="middle" font-size="6" fill="#7f8c8d">(Modelo de percolação: Celzard et al. 1996)</text>

    <!-- (c) Restrição esferulítica -->
    <rect x="580" y="25" width="280" height="140" class="card"/>
    <text x="720" y="45" text-anchor="middle" font-size="9" fill="#1a5276" font-weight="bold">(c) Restrição Esferulítica</text>
    <!-- Esferulito grande -->
    <circle cx="640" cy="85" r="22" fill="none" stroke="#e74c3c" stroke-width="2"/>
    <circle cx="640" cy="85" r="3" fill="#e74c3c"/>
    <text x="640" y="115" text-anchor="middle" font-size="6" fill="#e74c3c">PELBD: 18±8 μm</text>

    <line x1="675" y1="85" x2="695" y2="85" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowGreen)"/>

    <!-- Múltiplos esferulitos pequenos -->
    <circle cx="730" cy="80" r="6" fill="none" stroke="#27ae60" stroke-width="1"/>
    <circle cx="740" cy="90" r="6" fill="none" stroke="#27ae60" stroke-width="1"/>
    <circle cx="725" cy="95" r="6" fill="none" stroke="#27ae60" stroke-width="1"/>
    <text x="740" y="115" text-anchor="middle" font-size="6" fill="#27ae60">Nano: 8±3 μm</text>

    <text x="720" y="148" text-anchor="middle" font-size="6.5" fill="#333">Morfologia <b>mais fina e uniforme</b> = menor variância</text>
    <text x="720" y="160" text-anchor="middle" font-size="6" fill="#7f8c8d">(Restrição de crescimento lamelar)</text>
  </g>

  <!-- Impacto no Dardo -->
  <g transform="translate(20,440)">
    <rect x="0" y="0" width="860" height="100" rx="8" fill="#e8f4f8" stroke="#1a5276" stroke-width="1.5"/>
    <text x="430" y="20" text-anchor="middle" class="subtitle">Validação por Impacto de Dardo a −40°C (Staircase, n=12)</text>

    <rect x="20" y="30" width="240" height="55" rx="6" fill="#fdf2f2" stroke="#e74c3c" stroke-width="1"/>
    <text x="140" y="46" text-anchor="middle" font-size="9" fill="#e74c3c" font-weight="bold">PELBD-R</text>
    <text x="140" y="62" text-anchor="middle" font-size="8" fill="#333">H_50 = 1,08 ± 0,05 m</text>
    <text x="140" y="78" text-anchor="middle" font-size="7" fill="#e74c3c">100% fratura frágil</text>

    <line x1="275" y1="58" x2="310" y2="58" stroke="#27ae60" stroke-width="3" marker-end="url(#arrowGreen)"/>
    <text x="293" y="48" text-anchor="middle" font-size="7" fill="#27ae60" font-weight="bold">≥36%</text>

    <rect x="320" y="30" width="240" height="55" rx="6" fill="#e8f8e8" stroke="#27ae60" stroke-width="1"/>
    <text x="440" y="46" text-anchor="middle" font-size="9" fill="#27ae60" font-weight="bold">Nanocompósito-R</text>
    <text x="440" y="62" text-anchor="middle" font-size="8" fill="#333">H_50 &gt; 1,45 m (limite)</text>
    <text x="440" y="78" text-anchor="middle" font-size="7" fill="#27ae60">10/12 sem fratura frágil</text>

    <rect x="580" y="30" width="260" height="55" rx="6" fill="#fef9e7" stroke="#e67e22" stroke-width="1"/>
    <text x="710" y="46" text-anchor="middle" font-size="8" fill="#e67e22" font-weight="bold">Fisher exato: p &lt; 0,001</text>
    <text x="710" y="62" text-anchor="middle" font-size="7.5" fill="#333">Energia: 20,5 → &gt;28,0 J/mm</text>
    <text x="710" y="78" text-anchor="middle" font-size="7" fill="#7f8c8d">Tenacidade criogênica melhorada</text>
  </g>

  <!-- Citações -->
  <g transform="translate(20,555)">
    <text x="430" y="12" text-anchor="middle" class="cite" font-size="8">
      [Taguchi, Introduction to Quality Engineering. APO (1986). Robust design — redução de variância como princípio de engenharia]
    </text>
    <text x="430" y="24" text-anchor="middle" class="cite" font-size="8">
      [Menard &amp; Menard, Dynamic Mechanical Analysis, 3ed. CRC Press (2020). DOI: 10.1201/9780429190308 — DMA para validação de propriedades viscoelásticas]
    </text>
    <text x="430" y="36" text-anchor="middle" class="cite" font-size="8">
      [Celzard et al., Phys. Rev. B 53, 6209 (1996). DOI: 10.1103/PhysRevB.53.6209 — Modelo de percolação para condutividade térmica efetiva]
    </text>
  </g>

  <!-- Legenda geral -->
  <text x="450" y="620" text-anchor="middle" class="annot" font-size="9">
    Legenda: Primeira demonstração de nanopartículas como Variance Reduction Agents (VRA) em manufatura. Três mecanismos sinérgicos (nucleação uniformizada, condutividade térmica aumentada, restrição esferulítica)
    convergem para reduzir o CV do módulo em 37,5%. Validado por três provas independentes (Brown-Forsythe p=0,003, teste t p=0,015, bootstrap 97,3%) e confirmado por impacto de dardo criogênico (≥36%).
  </text>

</svg>
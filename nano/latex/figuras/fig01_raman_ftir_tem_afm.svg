<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <style>
      .axis { stroke: #333; stroke-width: 1.2; fill: none; }
      .grid { stroke: #ddd; stroke-width: 0.5; stroke-dasharray: 3,3; fill: none; }
      .title { font-size: 13px; font-weight: bold; fill: #1a5276; }
      .label { font-size: 10px; fill: #333; }
      .annot { font-size: 9px; fill: #e67e22; font-style: italic; }
      .cite { font-size: 7px; fill: #7f8c8d; }
      .band { fill: #1a5276; opacity: 0.08; }
      .peak { stroke: #27ae60; stroke-width: 1.8; fill: none; }
      .data-line { stroke: #1a5276; stroke-width: 2.5; fill: none; }
      .data-fill { fill: #1a5276; opacity: 0.15; }
      .box { fill: none; stroke: #7f8c8d; stroke-width: 1; }
      .subtitle { font-size: 11px; font-weight: bold; fill: #1a5276; }
    </style>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1a5276"/></marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#e67e22"/></marker>
  </defs>

  <!-- Fundo -->
  <rect width="1000" height="700" fill="white"/>
  <text x="500" y="22" text-anchor="middle" class="title" font-size="15">Figura 1 — Painel de Caracterização Multimodal do rGO</text>
  <line x1="100" y1="30" x2="900" y2="30" stroke="#1a5276" stroke-width="1"/>

  <!-- ====== (a) RAMAN ====== -->
  <g transform="translate(20,40)">
    <rect x="0" y="0" width="460" height="300" class="box"/>
    <text x="230" y="18" text-anchor="middle" class="subtitle">(a) Espectro Raman — 532 nm</text>

    <!-- Eixos -->
    <line x1="55" y1="30" x2="55" y2="270" class="axis"/>
    <line x1="55" y1="270" x2="440" y2="270" class="axis"/>
    <text x="30" y="155" text-anchor="middle" class="label" transform="rotate(-90,30,155)" font-size="9">Intensidade (u.a.)</text>
    <text x="245" y="295" text-anchor="middle" class="label">Deslocamento Raman (cm⁻¹)</text>

    <!-- Grid -->
    <line x1="55" y1="80" x2="440" y2="80" class="grid"/><line x1="55" y1="150" x2="440" y2="150" class="grid"/><line x1="55" y1="220" x2="440" y2="220" class="grid"/>
    <line x1="140" y1="30" x2="140" y2="270" class="grid"/><line x1="225" y1="30" x2="225" y2="270" class="grid"/><line x1="310" y1="30" x2="310" y2="270" class="grid"/><line x1="395" y1="30" x2="395" y2="270" class="grid"/>

    <!-- Ticks X -->
    <text x="55" y="283" class="label" font-size="8" text-anchor="middle">800</text>
    <text x="140" y="283" class="label" font-size="8" text-anchor="middle">1200</text>
    <text x="183" y="283" class="label" font-size="8" text-anchor="middle">1352</text>
    <text x="235" y="283" class="label" font-size="8" text-anchor="middle">1585</text>
    <text x="310" y="283" class="label" font-size="8" text-anchor="middle">2400</text>
    <text x="345" y="283" class="label" font-size="8" text-anchor="middle">2695</text>
    <text x="395" y="283" class="label" font-size="8" text-anchor="middle">3200</text>

    <!-- Espectro Raman simulado -->
    <path d="M55,250 Q70,248 100,230 L120,225 L130,210 Q140,120 150,90 L155,85 Q160,145 165,205 L175,215 Q183,80 190,60 L195,55 Q200,130 210,195 L225,200 Q230,45 235,35 L245,38 Q250,120 265,200 L310,210 Q345,65 350,55 L355,60 Q360,140 395,230" class="data-line" stroke-width="2"/>
    <path d="M55,250 Q70,248 100,230 L120,225 L130,210 Q140,120 150,90 L155,85 Q160,145 165,205 L175,215 Q183,80 190,60 L195,55 Q200,130 210,195 L225,200 Q230,45 235,35 L245,38 Q250,120 265,200 L310,210 Q345,65 350,55 L355,60 Q360,140 395,230 L440,260" fill="none" stroke="#1a5276" stroke-width="2.5"/>

    <!-- Anotações Raman -->
    <line x1="183" y1="265" x2="183" y2="120" stroke="#e67e22" stroke-width="0.8" stroke-dasharray="2,2"/>
    <circle cx="183" cy="120" r="4" fill="#e67e22"/>
    <text x="183" y="112" text-anchor="middle" class="annot">Banda D</text>
    <text x="183" y="102" text-anchor="middle" font-size="7" fill="#7f8c8d">1352 cm⁻¹</text>

    <line x1="235" y1="265" x2="235" y2="45" stroke="#e67e22" stroke-width="0.8" stroke-dasharray="2,2"/>
    <circle cx="235" cy="45" r="4" fill="#e67e22"/>
    <text x="235" y="65" text-anchor="middle" class="annot">Banda G</text>
    <text x="235" y="75" text-anchor="middle" font-size="7" fill="#7f8c8d">1585 cm⁻¹</text>

    <line x1="345" y1="265" x2="345" y2="70" stroke="#27ae60" stroke-width="0.8" stroke-dasharray="2,2"/>
    <circle cx="345" cy="70" r="4" fill="#27ae60"/>
    <text x="345" y="90" text-anchor="middle" class="annot">2D</text>
    <text x="345" y="100" text-anchor="middle" font-size="7" fill="#7f8c8d">2695 cm⁻¹</text>

    <!-- Caixa de parâmetros -->
    <rect x="300" y="35" width="155" height="72" rx="4" fill="white" stroke="#1a5276" stroke-width="0.8"/>
    <text x="307" y="48" font-size="8" font-weight="bold" fill="#1a5276">Parâmetros Raman:</text>
    <text x="307" y="60" font-size="7.5" fill="#333">I</text><text x="315" y="60" font-size="6" fill="#333">D</text><text x="321" y="60" font-size="7.5" fill="#333">/I</text><text x="330" y="60" font-size="6" fill="#333">G</text><text x="336" y="60" font-size="7.5" fill="#333"> = 1,12 ± 0,03</text>
    <text x="307" y="72" font-size="7.5" fill="#333">L</text><text x="315" y="72" font-size="6" fill="#333">D</text><text x="321" y="72" font-size="7.5" fill="#333"> = 15,8 nm</text>
    <text x="307" y="84" font-size="7.5" fill="#333">I</text><text x="315" y="84" font-size="6" fill="#333">2D</text><text x="327" y="84" font-size="7.5" fill="#333">/I</text><text x="336" y="84" font-size="6" fill="#333">G</text><text x="342" y="84" font-size="7.5" fill="#333"> = 0,35</text>
    <text x="307" y="96" font-size="7.5" fill="#333">n</text><text x="315" y="96" font-size="6" fill="#333">D</text><text x="321" y="96" font-size="7.5" fill="#333"> ≈ 4,0×10</text><text x="365" y="96" font-size="6" fill="#333">15</text><text x="375" y="96" font-size="7.5" fill="#333"> m</text><text x="387" y="96" font-size="6" fill="#333">−2</text>

    <text x="55" y="308" font-size="6.5" fill="#7f8c8d">[Ferrari &amp; Robertson, Phys. Rev. B 61, 14095 (2000). DOI: 10.1103/PhysRevB.61.14095]</text>
  </g>

  <!-- ====== (b) FTIR ====== -->
  <g transform="translate(500,40)">
    <rect x="0" y="0" width="460" height="300" class="box"/>
    <text x="230" y="18" text-anchor="middle" class="subtitle">(b) Espectro FTIR — rGO em KBr</text>

    <line x1="55" y1="30" x2="55" y2="270" class="axis"/>
    <line x1="55" y1="270" x2="440" y2="270" class="axis"/>
    <text x="30" y="155" text-anchor="middle" class="label" font-size="9" transform="rotate(-90,30,155)">Transmitância (%)</text>
    <text x="245" y="295" text-anchor="middle" class="label">Número de Onda (cm⁻¹)</text>

    <line x1="55" y1="80" x2="440" y2="80" class="grid"/><line x1="55" y1="150" x2="440" y2="150" class="grid"/><line x1="55" y1="220" x2="440" y2="220" class="grid"/>
    <line x1="95" y1="30" x2="95" y2="270" class="grid"/><line x1="135" y1="30" x2="135" y2="270" class="grid"/><line x1="175" y1="30" x2="175" y2="270" class="grid"/><line x1="215" y1="30" x2="215" y2="270" class="grid"/><line x1="255" y1="30" x2="255" y2="270" class="grid"/><line x1="295" y1="30" x2="295" y2="270" class="grid"/><line x1="335" y1="30" x2="335" y2="270" class="grid"/><line x1="375" y1="30" x2="375" y2="270" class="grid"/><line x1="415" y1="30" x2="415" y2="270" class="grid"/>

    <!-- Ticks -->
    <text x="55" y="283" class="label" font-size="7" text-anchor="middle">4000</text>
    <text x="95" y="283" class="label" font-size="7" text-anchor="middle">3500</text>
    <text x="128" y="283" class="label" font-size="7" text-anchor="middle">3430</text>
    <text x="175" y="283" class="label" font-size="7" text-anchor="middle">2500</text>
    <text x="215" y="283" class="label" font-size="7" text-anchor="middle">2000</text>
    <text x="232" y="283" class="label" font-size="7" text-anchor="middle">1720</text>
    <text x="240" y="283" class="label" font-size="7" text-anchor="middle">1575</text>
    <text x="295" y="283" class="label" font-size="7" text-anchor="middle">1500</text>
    <text x="360" y="283" class="label" font-size="7" text-anchor="middle">1220</text>
    <text x="390" y="283" class="label" font-size="7" text-anchor="middle">1050</text>
    <text x="415" y="283" class="label" font-size="7" text-anchor="middle">500</text>

    <!-- Espectro FTIR -->
    <path d="M55,250 Q70,245 85,240 L95,220 L105,210 Q110,195 115,205 L128,90 L135,120 Q155,175 175,200 L195,218 Q215,195 225,205 L232,135 L240,125 L250,215 Q275,225 295,220 L320,210 Q335,170 345,180 L360,140 Q370,175 375,195 L390,150 Q400,190 415,200 L440,218" class="data-line" stroke-width="2"/>

    <!-- Picos anotados -->
    <g>
      <line x1="128" y1="265" x2="128" y2="95" stroke="#e67e22" stroke-width="0.8" stroke-dasharray="2,2"/>
      <circle cx="128" cy="95" r="3.5" fill="#e67e22"/>
      <text x="128" y="88" text-anchor="middle" class="annot" font-size="7">O-H</text>
      <text x="128" y="80" text-anchor="middle" font-size="6" fill="#7f8c8d">3430 cm⁻¹</text>
    </g>
    <g>
      <line x1="232" y1="265" x2="232" y2="140" stroke="#e67e22" stroke-width="0.8" stroke-dasharray="2,2"/>
      <circle cx="232" cy="140" r="3.5" fill="#e67e22"/>
      <text x="232" y="133" text-anchor="middle" class="annot" font-size="7">C=O</text>
      <text x="232" y="125" text-anchor="middle" font-size="6" fill="#7f8c8d">1720</text>
    </g>
    <g>
      <line x1="240" y1="265" x2="240" y2="130" stroke="#e67e22" stroke-width="0.8" stroke-dasharray="2,2"/>
      <circle cx="240" cy="130" r="3.5" fill="#e67e22"/>
      <text x="240" y="123" text-anchor="middle" class="annot" font-size="7">C=C</text>
      <text x="240" y="115" text-anchor="middle" font-size="6" fill="#7f8c8d">1575</text>
    </g>
    <g>
      <line x1="360" y1="265" x2="360" y2="145" stroke="#27ae60" stroke-width="0.8" stroke-dasharray="2,2"/>
      <circle cx="360" cy="145" r="3.5" fill="#27ae60"/>
      <text x="360" y="138" text-anchor="middle" class="annot" font-size="7">C-O epóxi</text>
      <text x="360" y="130" text-anchor="middle" font-size="6" fill="#7f8c8d">1220</text>
    </g>
    <g>
      <line x1="390" y1="265" x2="390" y2="155" stroke="#27ae60" stroke-width="0.8" stroke-dasharray="2,2"/>
      <circle cx="390" cy="155" r="3.5" fill="#27ae60"/>
      <text x="390" y="148" text-anchor="middle" class="annot" font-size="7">C-O álcool</text>
      <text x="390" y="140" text-anchor="middle" font-size="6" fill="#7f8c8d">1050</text>
    </g>

    <text x="55" y="308" font-size="6.5" fill="#7f8c8d">[Faria et al., Matéria 22, e11918 (2017). DOI: 10.1590/S1517-707620170005.0254]</text>
  </g>

  <!-- ====== (c) TEM ====== -->
  <g transform="translate(20,355)">
    <rect x="0" y="0" width="460" height="300" class="box"/>
    <text x="230" y="18" text-anchor="middle" class="subtitle">(c) Micrografia TEM Estilizada — rGO 200 kV</text>

    <!-- Moldura TEM circular -->
    <circle cx="230" cy="170" r="130" fill="none" stroke="#333" stroke-width="2"/>
    <circle cx="230" cy="170" r="127" fill="#f0f0f0"/>

    <!-- Folhas enrugadas estilizadas -->
    <path d="M130,120 Q150,100 170,125 Q180,140 190,130 Q200,115 210,135 Q230,105 250,130 Q265,145 275,125 Q290,140 300,160 Q280,180 260,170 Q245,160 235,175 Q215,155 195,170 Q180,185 155,175 Q135,185 130,120" fill="none" stroke="#1a5276" stroke-width="1.5" opacity="0.6"/>
    <path d="M140,140 Q170,115 195,145 Q215,160 235,145 Q255,160 275,145 Q290,155 295,170 Q270,190 245,185 Q225,170 210,190 Q190,175 170,190 Q150,180 140,140" fill="none" stroke="#1a5276" stroke-width="1" opacity="0.4"/>
    <path d="M160,155 Q185,135 205,155 Q220,165 235,155" fill="none" stroke="#1a5276" stroke-width="1.8" opacity="0.7"/>
    <!-- Dobras/rugas -->
    <path d="M175,140 Q180,155 175,170" fill="none" stroke="#e67e22" stroke-width="2"/>
    <path d="M250,145 Q255,160 250,175" fill="none" stroke="#e67e22" stroke-width="2"/>
    <path d="M210,150 Q215,165 210,180" fill="none" stroke="#e67e22" stroke-width="1.5"/>

    <!-- Barra de escala -->
    <line x1="330" y1="195" x2="330" y2="160" stroke="#333" stroke-width="1.5"/>
    <text x="335" y="180" class="label" font-size="7">0,5 μm</text>

    <!-- SAED inset -->
    <rect x="330" y="240" width="100" height="45" rx="4" fill="white" stroke="#1a5276" stroke-width="0.8"/>
    <text x="335" y="252" font-size="7" font-weight="bold" fill="#1a5276">SAED</text>
    <circle cx="380" cy="265" r="12" fill="none" stroke="#1a5276" stroke-width="0.5"/>
    <circle cx="380" cy="265" r="8" fill="none" stroke="#1a5276" stroke-width="0.5"/>
    <circle cx="380" cy="265" r="4" fill="none" stroke="#1a5276" stroke-width="0.5"/>
    <text x="380" y="282" text-anchor="middle" font-size="6" fill="#7f8c8d">Anéis difusos</text>

    <!-- Anotações -->
    <text x="40" y="245" class="annot" font-size="8">Folhas enrugadas</text>
    <text x="40" y="258" class="annot" font-size="8">l ≈ 0,2–2 μm</text>
    <text x="40" y="271" class="annot" font-size="8">α_eff ≈ 370</text>

    <text x="40" y="308" font-size="6.5" fill="#7f8c8d">[Lee et al., Science 321, 385 (2008). DOI: 10.1126/science.1157996]</text>
  </g>

  <!-- ====== (d) AFM ====== -->
  <g transform="translate(500,355)">
    <rect x="0" y="0" width="460" height="300" class="box"/>
    <text x="230" y="18" text-anchor="middle" class="subtitle">(d) Perfil AFM — Espessura de Folha (Tapping Mode)</text>

    <line x1="55" y1="30" x2="55" y2="250" class="axis"/>
    <line x1="55" y1="250" x2="440" y2="250" class="axis"/>
    <text x="30" y="140" text-anchor="middle" class="label" font-size="9" transform="rotate(-90,30,140)">Altura (nm)</text>
    <text x="245" y="275" text-anchor="middle" class="label">Distância Lateral (μm)</text>

    <!-- Grid -->
    <line x1="55" y1="80" x2="440" y2="80" class="grid"/><line x1="55" y1="140" x2="440" y2="140" class="grid"/><line x1="55" y1="210" x2="440" y2="210" class="grid"/>
    <line x1="130" y1="30" x2="130" y2="250" class="grid"/><line x1="210" y1="30" x2="210" y2="250" class="grid"/><line x1="290" y1="30" x2="290" y2="250" class="grid"/><line x1="370" y1="30" x2="370" y2="250" class="grid"/>

    <text x="55" y="263" class="label" font-size="7" text-anchor="middle">0</text>
    <text x="130" y="263" class="label" font-size="7" text-anchor="middle">0,5</text>
    <text x="210" y="263" class="label" font-size="7" text-anchor="middle">1,0</text>
    <text x="290" y="263" class="label" font-size="7" text-anchor="middle">1,5</text>
    <text x="370" y="263" class="label" font-size="7" text-anchor="middle">2,0</text>
    <text x="440" y="263" class="label" font-size="7" text-anchor="middle">2,5</text>

    <text x="40" y="78" text-anchor="end" class="label" font-size="7">1</text>
    <text x="40" y="138" text-anchor="end" class="label" font-size="7">3</text>
    <text x="40" y="248" text-anchor="end" class="label" font-size="7">0</text>

    <!-- Perfil AFM - folha depositada (linha base + pico) -->
    <path d="M55,240 L80,240 L100,238 L120,140 L130,138 L135,140 L140,235 L160,238 L180,240 L200,239 L220,240 L240,135 L250,133 L255,135 L260,238 L290,240 L320,241 L340,239 L360,140 L370,138 L375,139 L380,237 L400,240 L420,239 L440,240" class="data-line" stroke-width="2.5"/>

    <!-- Medição de espessura -->
    <line x1="125" y1="138" x2="125" y2="240" stroke="#e67e22" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="135" y1="140" x2="125" y2="140" stroke="#e67e22" stroke-width="1"/>
    <line x1="135" y1="240" x2="125" y2="240" stroke="#e67e22" stroke-width="1"/>
    <line x1="125" y1="138" x2="125" y2="140" stroke="#e67e22" stroke-width="2"/>
    <text x="120" y="195" class="annot" font-size="8" transform="rotate(-90,120,195)">2,7 ± 0,8 nm</text>

    <!-- Anotação monocamadas -->
    <text x="280" y="60" class="annot" font-size="8">Espessura = 2,7 ± 0,8 nm</text>
    <text x="280" y="73" class="annot" font-size="8">→ 5–8 monocamadas</text>
    <text x="280" y="86" class="annot" font-size="8">(d_001 ≈ 0,34 nm)</text>

    <rect x="270" y="110" width="170" height="65" rx="4" fill="white" stroke="#1a5276" stroke-width="0.8"/>
    <text x="280" y="125" font-size="7.5" font-weight="bold" fill="#1a5276">Análise (n = 20 folhas):</text>
    <text x="280" y="140" font-size="7.5" fill="#333">Espessura média: 2,7 nm</text>
    <text x="280" y="153" font-size="7.5" fill="#333">Desvio padrão: 0,8 nm</text>
    <text x="280" y="166" font-size="7.5" fill="#333">Camadas: 5–8 (d ≈ 0,341 nm)</text>

    <text x="40" y="308" font-size="6.5" fill="#7f8c8d">[Lee et al., Science 321, 385 (2008). DOI: 10.1126/science.1157996]</text>
  </g>

  <!-- Legenda geral -->
  <text x="500" y="685" text-anchor="middle" class="cite" font-size="8">
    Legenda: Caracterização multimodal confirmando redução efetiva do GO (I_D/I_G=1,12=transição baixo→alto defeito [Ferrari &amp; Robertson 2000]),
    grupos funcionais residuais (OH, C=O, C=C, C-O) essenciais para ancoragem interfacial [Faria et al. 2017], morfologia 2D enrugada com 5–8 camadas [Lee et al. 2008].
  </text>

</svg>
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      #result { display: none; }

      /* opção recomendada: classe customizada para o botão */
      .btn-custom {
        background-color: #4C2CCD;
        color: #ffffff;
        border: none;
        box-shadow: 0 2px 6px rgba(76,44,205,0.18);
      }
      .btn-custom:hover,
      .btn-custom:focus {
        background-color: #3f23b8; /* hover slightly darker */
        color: #fff;
      }

      /* se quiser que o botão fique um pouco maior (opcional) */
      .btn-md { padding: 10px 14px; font-size: 15px; }
    </style>
  </head>
  <body>
    <div class="card text-center p-4" style="width: 400px">
      <h5>Detector de Phishing</h5>

      <!-- usar a classe customizada junto com utilitários do Bootstrap -->
      <button class="btn btn-md btn-custom w-100 mt-3" id="checkButton">Cheque a URL Atual</button>

      <div class="alert mt-3" id="result" role="alert"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="popup.js"></script>
  </body>
</html>

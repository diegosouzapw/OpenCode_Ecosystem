<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact Form (Step 2)</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: #111a2e;
      --text: #e8eefc;
      --muted: #a9b6d6;
      --border: rgba(255,255,255,.10);
      --focus: rgba(99, 102, 241, .45);
      --btn: #6366f1;
      --btn-hover: #4f46e5;
      --shadow: 0 18px 60px rgba(0,0,0,.45);
      --radius: 14px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: radial-gradient(900px 500px at 20% 10%, rgba(99,102,241,.22), transparent 60%),
                  radial-gradient(900px 500px at 80% 20%, rgba(56,189,248,.16), transparent 55%),
                  var(--bg);
      color: var(--text);
    }

    .wrap { width: min(720px, 100%); }

    header { margin-bottom: 14px; }
    h1 {
      margin: 0 0 6px;
      font-size: clamp(22px, 3vw, 30px);
      letter-spacing: -0.02em;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }

    form {
      margin-top: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      backdrop-filter: blur(10px);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field { display: grid; gap: 8px; }
    label {
      font-size: 13px;
      color: var(--muted);
    }

    input, select, textarea {
      width: 100%;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(10, 16, 30, .65);
      color: var(--text);
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease, transform .05s ease;
    }

    input::placeholder, textarea::placeholder { color: rgba(169,182,214,.65); }

    input:focus, select:focus, textarea:focus {
      border-color: rgba(99,102,241,.65);
      box-shadow: 0 0 0 4px var(--focus);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .hint {
      font-size: 12px;
      color: rgba(169,182,214,.85);
    }

    button[type="submit"] {
      border: 0;
      border-radius: 12px;
      padding: 11px 14px;
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.02)), var(--btn);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: transform .08s ease, background .15s ease, filter .15s ease;
    }
    button[type="submit"]:hover {
      background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.02)), var(--btn-hover);
      filter: brightness(1.05);
      transform: translateY(-1px);
    }
    button[type="submit"]:active { transform: translateY(0px) scale(.99); }

    /* Responsivo */
    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      form { padding: 16px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>Contact request</h1>
      <p>Fill out the form below. (Step 2: discoverable tool via <code>toolname</code> and <code>tooldescription</code>)</p>
    </header>

    <form
      id="contactForm"
      toolname="submit_contact_request"
      tooldescription="Submits a contact request with the user's name, email, priority, and message. Returns a confirmation with a reference number."
      novalidate
    >
      <div class="grid">
        <div class="field">
          <label for="name">Name</label>
          <input id="name" type="text" name="name" required minlength="2" placeholder="Your name" />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" name="email" required placeholder="you@company.com" />
        </div>
      </div>

      <div class="grid" style="margin-top:14px;">
        <div class="field">
          <label for="priority">Priority</label>
          <select id="priority" name="priority">
            <option value="Low">Low</option>
            <option value="Normal" selected>Normal</option>
            <option value="Urgent">Urgent</option>
          </select>
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" required minlength="10" placeholder="How can we help?"></textarea>
        </div>
      </div>

      <div class="actions">
        <div class="hint">Tip: Use “Urgent” only for time-sensitive issues.</div>
        <button type="submit">Send</button>
      </div>
    </form>
  </div>
</body>
</html>
